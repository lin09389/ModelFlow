<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ModelFlow - 混合模型路由控制台</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --bg-hover: #22222e;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --border: #2a2a3a;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --radius: 12px;
      --radius-sm: 8px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .version {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 1024px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      font-size: 18px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-badge.auto {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
    }

    .status-badge.manual {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    .status-badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .switch-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
    }

    .btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn.primary:hover {
      background: var(--accent-hover);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .strategy-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .stat-item {
      background: var(--bg-secondary);
      padding: 16px;
      border-radius: var(--radius-sm);
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .stat-item.small .stat-value { color: var(--success); }
    .stat-item.medium .stat-value { color: var(--accent); }
    .stat-item.large .stat-value { color: var(--warning); }

    .test-section {
      margin-top: 24px;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .input-group input {
      flex: 1;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    .result-box {
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: 'SF Mono', Monaco, 'Courier New', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
      color: var(--text-secondary);
    }

    .result-box .highlight {
      color: var(--accent);
    }

    .result-box .success {
      color: var(--success);
    }

    .result-box .warning {
      color: var(--warning);
    }

    .model-input {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .model-input label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .history-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      font-size: 13px;
    }

    .history-item .message {
      color: var(--text-primary);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item .meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .history-item .level {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .history-item .level.small { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .history-item .level.medium { background: rgba(99, 102, 241, 0.2); color: var(--accent); }
    .history-item .level.large { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

    .history-item .time {
      color: var(--text-muted);
      font-size: 11px;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--success);
    }

    .toast.error {
      border-color: var(--error);
    }

    .progress-bar {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 16px;
    }

    .progress-bar .fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }

    .progress-bar .fill.small { background: var(--success); }
    .progress-bar .fill.medium { background: var(--accent); }
    .progress-bar .fill.large { background: var(--warning); }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <h1>ModelFlow</h1>
      </div>
      <span class="version">v2.0</span>
    </header>

    <div class="grid">
      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <span class="icon">🎛️</span>
            Switch 控制
          </span>
          <span class="status-badge auto" id="statusBadge">
            <span class="dot"></span>
            <span id="statusText">自动模式</span>
          </span>
        </div>

        <div class="switch-buttons">
          <button class="btn active" data-mode="auto" onclick="setMode('auto')">自动</button>
          <button class="btn" data-mode="small" onclick="setMode('small')">Small</button>
          <button class="btn" data-mode="medium" onclick="setMode('medium')">Medium</button>
          <button class="btn" data-mode="large" onclick="setMode('large')">Large</button>
        </div>

        <div class="card-title" style="margin-bottom: 12px; font-size: 14px;">
          <span class="icon">📊</span>
          路由策略
        </div>
        <div class="strategy-buttons">
          <button class="btn active" data-strategy="balanced" onclick="setStrategy('balanced')">平衡</button>
          <button class="btn" data-strategy="cost-optimal" onclick="setStrategy('cost-optimal')">成本优先</button>
          <button class="btn" data-strategy="performance" onclick="setStrategy('performance')">性能优先</button>
        </div>

        <div class="model-input">
          <label>直接指定模型</label>
          <div class="input-group">
            <input type="text" id="modelInput" placeholder="例如: gpt-4o, claude-opus-4-6">
            <button class="btn primary" onclick="setModel()">应用</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <span class="icon">📈</span>
            使用统计
          </span>
          <button class="btn" onclick="resetStats()">重置</button>
        </div>

        <div class="stats-grid">
          <div class="stat-item small">
            <div class="stat-value" id="smallCount">0</div>
            <div class="stat-label">Small 模型</div>
          </div>
          <div class="stat-item medium">
            <div class="stat-value" id="mediumCount">0</div>
            <div class="stat-label">Medium 模型</div>
          </div>
          <div class="stat-item large">
            <div class="stat-value" id="largeCount">0</div>
            <div class="stat-label">Large 模型</div>
          </div>
        </div>

        <div class="progress-bar">
          <div class="fill small" id="progressFill" style="width: 33%"></div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 12px; font-size: 12px; color: var(--text-muted);">
          <span>总请求: <strong id="totalRequests">0</strong></span>
          <span>预估成本: <strong id="totalCost">$0.00</strong></span>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <span class="icon">🧪</span>
            路由测试
          </span>
        </div>

        <div class="test-section">
          <div class="input-group">
            <input type="text" id="testInput" placeholder="输入消息测试路由效果..." onkeypress="if(event.key==='Enter')testRoute()">
            <button class="btn primary" onclick="testRoute()" id="testBtn">测试</button>
          </div>

          <div class="result-box" id="testResult">
等待输入测试消息...
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <span class="icon">📜</span>
            历史记录
          </span>
          <button class="btn" onclick="clearHistory()">清空</button>
        </div>

        <div class="history-list" id="historyList">
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>暂无历史记录</p>
          </div>
        </div>
      </div>
    </div>

    <footer>
      ModelFlow v2.0 · 混合模型路由系统 · <a href="https://github.com/openclaw/openclaw">OpenClaw</a>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = window.location.origin;
    
    let state = {
      mode: 'auto',
      model: null,
      strategy: 'balanced',
      stats: { small: 0, medium: 0, large: 0, totalCost: 0 },
      history: []
    };

    async function api(endpoint, method = 'GET', body = null) {
      const options = {
        method,
        headers: { 'Content-Type': 'application/json' }
      };
      if (body) options.body = JSON.stringify(body);
      
      const res = await fetch(`${API_BASE}${endpoint}`, options);
      return res.json();
    }

    async function loadState() {
      const saved = localStorage.getItem('modelflow_state');
      if (saved) {
        state = { ...state, ...JSON.parse(saved) };
      }
      
      try {
        const res = await api('/api/status');
        if (res.success && res.data) {
          state.stats = res.data.metrics?.modelUsage || state.stats;
          state.stats.totalCost = res.data.metrics?.totalCost || 0;
        }
      } catch (err) {
        console.log('Using local state');
      }
      
      updateUI();
    }

    function saveState() {
      localStorage.setItem('modelflow_state', JSON.stringify(state));
    }

    function updateUI() {
      document.querySelectorAll('[data-mode]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === state.mode);
      });

      document.querySelectorAll('[data-strategy]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.strategy === state.strategy);
      });

      const badge = document.getElementById('statusBadge');
      const statusText = document.getElementById('statusText');
      
      if (state.mode === 'auto') {
        badge.className = 'status-badge auto';
        statusText.textContent = '自动模式';
      } else if (state.mode === 'manual') {
        badge.className = 'status-badge manual';
        statusText.textContent = `手动: ${state.model}`;
      } else {
        badge.className = 'status-badge auto';
        statusText.textContent = `强制: ${state.mode}`;
      }

      document.getElementById('smallCount').textContent = state.stats.small || 0;
      document.getElementById('mediumCount').textContent = state.stats.medium || 0;
      document.getElementById('largeCount').textContent = state.stats.large || 0;
      
      const total = (state.stats.small || 0) + (state.stats.medium || 0) + (state.stats.large || 0);
      document.getElementById('totalRequests').textContent = total;
      document.getElementById('totalCost').textContent = `$${(state.stats.totalCost || 0).toFixed(4)}`;

      if (total > 0) {
        const smallPercent = ((state.stats.small || 0) / total * 100).toFixed(1);
        document.getElementById('progressFill').style.width = `${smallPercent}%`;
      }

      renderHistory();
    }

    async function setMode(mode) {
      state.mode = mode;
      state.model = null;
      saveState();
      updateUI();
      
      try {
        await api('/api/switch', 'POST', { command: mode });
      } catch (err) {}
      
      showToast(`已切换到 ${mode === 'auto' ? '自动模式' : mode + ' 模型'}`, 'success');
    }

    async function setStrategy(strategy) {
      state.strategy = strategy;
      saveState();
      updateUI();
      
      try {
        await api('/api/switch', 'POST', { command: strategy });
      } catch (err) {}
      
      showToast(`策略已切换为: ${strategy}`, 'success');
    }

    async function setModel() {
      const model = document.getElementById('modelInput').value.trim();
      if (!model) {
        showToast('请输入模型名称', 'error');
        return;
      }
      state.mode = 'manual';
      state.model = model;
      saveState();
      updateUI();
      
      try {
        await api('/api/switch', 'POST', { command: model });
      } catch (err) {}
      
      showToast(`模型已设置为: ${model}`, 'success');
    }

    async function testRoute() {
      const message = document.getElementById('testInput').value.trim();
      if (!message) {
        showToast('请输入测试消息', 'error');
        return;
      }

      const btn = document.getElementById('testBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        const res = await api('/api/test', 'POST', { message });
        
        if (res.success && res.data) {
          const result = res.data;
          const level = result.routing?.level || 'small';
          const model = result.routing?.modelRef || 'unknown';
          const reason = result.routing?.reason || 'N/A';

          state.stats[level] = (state.stats[level] || 0) + 1;
          state.stats.totalCost = (state.stats.totalCost || 0) + 0.002;

          state.history.unshift({
            message: message.substring(0, 50),
            level: level,
            model: model,
            time: new Date().toLocaleTimeString()
          });

          if (state.history.length > 20) state.history.pop();

          saveState();
          updateUI();

          const resultBox = document.getElementById('testResult');
          resultBox.innerHTML = `<span class="success">✓ 路由结果</span>

<span class="highlight">消息:</span> ${message}
<span class="highlight">级别:</span> <span class="${level}">${level.toUpperCase()}</span>
<span class="highlight">模型:</span> ${model}
<span class="highlight">原因:</span> ${reason}
<span class="highlight">策略:</span> ${state.strategy}`;
        }
      } catch (err) {
        showToast('测试失败: ' + err.message, 'error');
      }

      btn.disabled = false;
      btn.textContent = '测试';
      document.getElementById('testInput').value = '';
    }

    function renderHistory() {
      const container = document.getElementById('historyList');
      
      if (state.history.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>暂无历史记录</p>
          </div>
        `;
        return;
      }

      container.innerHTML = state.history.map(item => `
        <div class="history-item">
          <span class="message">${item.message}</span>
          <div class="meta">
            <span class="level ${item.level}">${item.level}</span>
            <span class="time">${item.time}</span>
          </div>
        </div>
      `).join('');
    }

    function clearHistory() {
      state.history = [];
      saveState();
      updateUI();
      showToast('历史记录已清空', 'success');
    }

    function resetStats() {
      state.stats = { small: 0, medium: 0, large: 0, totalCost: 0 };
      saveState();
      updateUI();
      showToast('统计数据已重置', 'success');
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    loadState();
  </script>
</body>
</html>
